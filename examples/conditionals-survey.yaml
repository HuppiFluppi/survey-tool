---
# Page 5
title: "Final Page"
content:
  # Choice questions are questions which can be scored. You usually ask for things like favorite color or to pick the right answer
  # They can be multiple or single choice.
  - type: choice
    required: true
    title: "How did you learn your favorite language?"
    config:
      conditional_key: learn # String (optional). If given, this choice question can be used for conditionally showing other elements by using this reference. Must be unique.
      choices: # list of choices
        - title: "Websites" # String (required). Title of the choice
        - title: "Book"
        - title: "Course"
        - title: "Other"

  - type: text
    required: true
    conditional:
      key: learn
      value:
        - "Other"
    title: "Please specify how"
