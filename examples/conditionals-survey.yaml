    config:
      horizontal: true # Boolean (default: false). If true, choices will be shown horizontally
      conditional_key: rustExperience # String (optional). If given, this choice question can be used for conditionally showing other elements by using this reference. Must be unique.
      choices: # list of choices
        - title: "Yes" # String (required). Title of the choice
        - title: "No"
        - title: "Dont know"

  - type: text
